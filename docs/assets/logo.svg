<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <!-- Teal gradient for fish body -->
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00BFA5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00796B;stop-opacity:1" />
    </linearGradient>
    <!-- Cyan gradient for tail -->
    <linearGradient id="tailGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00BCD4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0097A7;stop-opacity:1" />
    </linearGradient>
    <!-- Wave animation filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- SSE waves — animated -->
  <g opacity="0.25">
    <path d="M 10 60 Q 20 45 30 60" stroke="#00BFA5" stroke-width="2.5"
      fill="none" stroke-linecap="round">
      <animate attributeName="opacity" values="0.2;0.7;0.2"
        dur="2s" repeatCount="indefinite" begin="0s"/>
    </path>
    <path d="M 6 60 Q 20 38 34 60" stroke="#00BFA5" stroke-width="2"
      fill="none" stroke-linecap="round">
      <animate attributeName="opacity" values="0.1;0.5;0.1"
        dur="2s" repeatCount="indefinite" begin="0.3s"/>
    </path>
    <path d="M 2 60 Q 20 30 38 60" stroke="#00BFA5" stroke-width="1.5"
      fill="none" stroke-linecap="round">
      <animate attributeName="opacity" values="0.05;0.3;0.05"
        dur="2s" repeatCount="indefinite" begin="0.6s"/>
    </path>
  </g>

  <!-- Fish tail -->
  <path d="M 88 60 L 112 42 L 106 60 L 112 78 Z"
    fill="url(#tailGrad)" opacity="0.9"/>

  <!-- Fish body -->
  <ellipse cx="65" cy="60" rx="28" ry="18"
    fill="url(#bodyGrad)" filter="url(#glow)"/>

  <!-- Fin (top) -->
  <path d="M 55 43 Q 65 35 75 43"
    fill="#00897B" opacity="0.8"/>

  <!-- Fin (bottom) -->
  <path d="M 58 77 Q 65 84 72 77"
    fill="#00897B" opacity="0.6"/>

  <!-- Eye -->
  <circle cx="50" cy="56" r="4.5" fill="white"/>
  <circle cx="51" cy="56" r="2.5" fill="#1A237E"/>
  <circle cx="52" cy="55" r="1" fill="white"/>

  <!-- Scales — subtle arcs -->
  <path d="M 68 52 Q 74 58 68 64" stroke="white" stroke-width="1"
    fill="none" opacity="0.25"/>
  <path d="M 76 52 Q 82 58 76 64" stroke="white" stroke-width="1"
    fill="none" opacity="0.25"/>

  <!-- Mouth -->
  <path d="M 38 60 Q 40 63 42 60"
    stroke="#00695C" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Stream dots — animated — represent SSE events -->
  <circle cx="20" cy="48" r="2" fill="#80CBC4">
    <animate attributeName="cy" values="48;42;48"
      dur="1.8s" repeatCount="indefinite" begin="0s"/>
    <animate attributeName="opacity" values="0;1;0"
      dur="1.8s" repeatCount="indefinite" begin="0s"/>
  </circle>
  <circle cx="26" cy="52" r="2" fill="#80CBC4">
    <animate attributeName="cy" values="52;46;52"
      dur="1.8s" repeatCount="indefinite" begin="0.4s"/>
    <animate attributeName="opacity" values="0;1;0"
      dur="1.8s" repeatCount="indefinite" begin="0.4s"/>
  </circle>
  <circle cx="20" cy="72" r="2" fill="#80CBC4">
    <animate attributeName="cy" values="72;78;72"
      dur="1.8s" repeatCount="indefinite" begin="0.8s"/>
    <animate attributeName="opacity" values="0;1;0"
      dur="1.8s" repeatCount="indefinite" begin="0.8s"/>
  </circle>
</svg>
